<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>RISE · Habits</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --surface2: #1e1e22;
    --border: #2a2a30;
    --text: #f0ede8;
    --muted: #7a7880;
    --accent: #e8c97e;
    --accent2: #c47a5a;
    --green: #6fcf97;
    --ember: #e07a5f;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── Header ── */
  header {
    padding: 28px 20px 0;
    position: relative;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.85;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    line-height: 1.1;
    margin-top: 6px;
    color: var(--text);
  }
  header h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .date-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    white-space: nowrap;
  }
  .divider {
    height: 1px;
    background: linear-gradient(90deg, var(--accent) 0%, transparent 70%);
    margin: 18px 20px 0;
    opacity: 0.3;
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 22px 20px 10px;
  }

  /* ── Habit cards ── */
  .habits-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 20px;
  }

  .habit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .habit-card.done {
    border-color: rgba(111,207,151,0.35);
  }
  .habit-card.done::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(111,207,151,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .habit-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .habit-icon {
    font-size: 22px;
    line-height: 1;
    flex-shrink: 0;
  }
  .habit-info { flex: 1; min-width: 0; }
  .habit-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .habit-streak {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .habit-streak span {
    color: var(--accent);
    font-weight: 600;
  }

  .check-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 16px;
    color: transparent;
  }
  .habit-card.done .check-btn {
    background: var(--green);
    border-color: var(--green);
    color: #0e0e10;
  }

  /* ── 7-day grid ── */
  .week-grid {
    display: flex;
    gap: 5px;
    margin-top: 10px;
  }
  .day-cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .day-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .day-dot {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    position: relative;
  }
  .day-dot.completed {
    background: var(--green);
    border-color: var(--green);
  }
  .day-dot.today-dot {
    border-color: var(--accent);
  }
  .day-dot.completed.today-dot {
    background: var(--green);
    border-color: var(--accent);
  }

  /* ── Streak summary bar ── */
  .streak-summary {
    display: flex;
    gap: 10px;
    padding: 0 20px;
    margin-top: 4px;
  }
  .streak-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }
  .streak-card .big-num {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    line-height: 1;
    color: var(--accent);
  }
  .streak-card .small-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── Today's score ring ── */
  .score-ring-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin: 0 20px;
  }
  .ring-svg { flex-shrink: 0; }
  .ring-text h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    line-height: 1.2;
  }
  .ring-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── Add custom habit ── */
  .add-section {
    padding: 0 20px;
  }
  .add-form {
    display: flex;
    gap: 8px;
  }
  .add-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-input:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--muted); }
  .emoji-input {
    width: 48px;
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 6px;
    color: var(--text);
    font-size: 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  .emoji-input:focus { border-color: var(--accent); }
  .add-btn {
    background: var(--accent);
    color: #0e0e10;
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .add-btn:active { opacity: 0.8; }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 0 0 8px;
    line-height: 1;
    transition: color 0.2s;
  }
  .delete-btn:active { color: var(--ember); }

  /* ── Animations ── */
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .habit-card { animation: fadeSlide 0.3s ease both; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #0e0e10;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 24px;
    transition: transform 0.3s ease;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="brand">RISE</div>
      <h1>Habit <em>Streaks</em></h1>
    </div>
    <div class="date-badge" id="dateBadge"></div>
  </div>
</header>
<div class="divider"></div>

<!-- Today's score -->
<div class="section-label">Today's Score</div>
<div class="score-ring-wrap">
  <svg class="ring-svg" width="64" height="64" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="26" fill="none" stroke="#2a2a30" stroke-width="7"/>
    <circle id="ringArc" cx="32" cy="32" r="26" fill="none" stroke="#6fcf97" stroke-width="7"
      stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="163.4"
      transform="rotate(-90 32 32)" style="transition: stroke-dashoffset 0.6s ease"/>
    <text x="32" y="37" text-anchor="middle" fill="#f0ede8"
      font-family="DM Serif Display, serif" font-size="17" id="ringPct">0%</text>
  </svg>
  <div class="ring-text">
    <h3 id="scoreHeadline">Start your day</h3>
    <p id="scoreSubline">Tap a habit to mark it done</p>
  </div>
</div>

<!-- Streak summary -->
<div class="section-label">Streaks</div>
<div class="streak-summary">
  <div class="streak-card">
    <div class="big-num" id="bestStreak">0</div>
    <div class="small-label">Best streak 🔥</div>
  </div>
  <div class="streak-card">
    <div class="big-num" id="activeDays">0</div>
    <div class="small-label">Active days this week</div>
  </div>
</div>

<!-- Habits -->
<div class="section-label">Habits</div>
<div class="habits-list" id="habitsList"></div>

<!-- Add custom -->
<div class="section-label">Add Custom Habit</div>
<div class="add-section">
  <div class="add-form">
    <input class="emoji-input" id="emojiInput" maxlength="2" placeholder="✦" value=""/>
    <input class="add-input" id="nameInput" placeholder="New habit name…" maxlength="30"/>
    <button class="add-btn" onclick="addCustomHabit()">Add</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const CIRCUMFERENCE = 2 * Math.PI * 26;

const DEFAULT_HABITS = [
  { id:'steps',    name:'Daily Steps',    icon:'👟', custom: false },
  { id:'strength', name:'Strength Workout', icon:'🏋️', custom: false },
  { id:'dinner',   name:'Dinner on Time', icon:'🍽️', custom: false },
  { id:'sauna',    name:'Sauna Session',  icon:'🧖', custom: false },
  { id:'stretch',  name:'Stretching',     icon:'🧘', custom: false },
];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getState() {
  return JSON.parse(localStorage.getItem('rise_habits_v1') || 'null') || {
    habits: DEFAULT_HABITS,
    log: {}
  };
}

function saveState(s) {
  localStorage.setItem('rise_habits_v1', JSON.stringify(s));
}

function getLast7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    days.push({ key, label: DAYS[d.getDay()], isToday: i === 0 });
  }
  return days;
}

function getStreakForHabit(log, habitId) {
  let streak = 0;
  const d = new Date();
  // Start from yesterday if not done today, else today
  const todayDone = (log[todayKey()] || []).includes(habitId);
  if (!todayDone) d.setDate(d.getDate() - 1);
  while (true) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if ((log[k] || []).includes(habitId)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  if (todayDone) streak = Math.max(streak, 1);
  return streak;
}

function getBestStreakOverall(log, habits) {
  return Math.max(0, ...habits.map(h => getStreakForHabit(log, h.id)));
}

function getActiveDaysThisWeek(log) {
  const days = getLast7Days();
  return days.filter(d => (log[d.key] || []).length > 0).length;
}

function toggleHabit(habitId) {
  const s = getState();
  const key = todayKey();
  if (!s.log[key]) s.log[key] = [];
  const idx = s.log[key].indexOf(habitId);
  if (idx === -1) {
    s.log[key].push(habitId);
    showToast('✓ Logged!');
  } else {
    s.log[key].splice(idx, 1);
  }
  saveState(s);
  render();
}

function addCustomHabit() {
  const name = document.getElementById('nameInput').value.trim();
  const icon = document.getElementById('emojiInput').value.trim() || '⭐';
  if (!name) return;
  const s = getState();
  const id = 'custom_' + Date.now();
  s.habits.push({ id, name, icon, custom: true });
  saveState(s);
  document.getElementById('nameInput').value = '';
  document.getElementById('emojiInput').value = '';
  render();
  showToast('Habit added!');
}

function deleteHabit(habitId) {
  const s = getState();
  s.habits = s.habits.filter(h => h.id !== habitId);
  saveState(s);
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function render() {
  const s = getState();
  const today = todayKey();
  const todayDone = s.log[today] || [];
  const days = getLast7Days();

  // Date badge
  document.getElementById('dateBadge').textContent = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

  // Score ring
  const pct = s.habits.length ? Math.round(todayDone.length / s.habits.length * 100) : 0;
  const offset = CIRCUMFERENCE - (pct / 100) * CIRCUMFERENCE;
  document.getElementById('ringArc').style.strokeDashoffset = offset;
  document.getElementById('ringPct').textContent = pct + '%';
  const done = todayDone.length, total = s.habits.length;
  if (done === 0) {
    document.getElementById('scoreHeadline').textContent = 'Start your day';
    document.getElementById('scoreSubline').textContent = 'Tap a habit to mark it done';
  } else if (done === total) {
    document.getElementById('scoreHeadline').textContent = 'All done! 🎉';
    document.getElementById('scoreSubline').textContent = 'You crushed it today, Sheila';
  } else {
    document.getElementById('scoreHeadline').textContent = `${done} of ${total} complete`;
    document.getElementById('scoreSubline').textContent = `${total - done} habit${total-done>1?'s':''} left today`;
  }

  // Streak numbers
  document.getElementById('bestStreak').textContent = getBestStreakOverall(s.log, s.habits);
  document.getElementById('activeDays').textContent = getActiveDaysThisWeek(s.log);

  // Habits list
  const list = document.getElementById('habitsList');
  list.innerHTML = '';
  s.habits.forEach((h, i) => {
    const isDone = todayDone.includes(h.id);
    const streak = getStreakForHabit(s.log, h.id);

    const card = document.createElement('div');
    card.className = 'habit-card' + (isDone ? ' done' : '');
    card.style.animationDelay = (i * 0.04) + 's';

    // Week grid
    const gridHtml = `<div class="week-grid">
      ${days.map(d => {
        const checked = (s.log[d.key] || []).includes(h.id);
        return `<div class="day-cell">
          <div class="day-label">${d.label}</div>
          <div class="day-dot${checked?' completed':''}${d.isToday?' today-dot':''}"></div>
        </div>`;
      }).join('')}
    </div>`;

    card.innerHTML = `
      <div class="habit-top">
        <div class="habit-icon">${h.icon}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-streak">Streak: <span>${streak} day${streak!==1?'s':''}</span></div>
        </div>
        ${h.custom ? `<button class="delete-btn" onclick="deleteHabit('${h.id}')" title="Remove">×</button>` : ''}
        <button class="check-btn" onclick="toggleHabit('${h.id}')">${isDone ? '✓' : ''}</button>
      </div>
      ${gridHtml}
    `;
    list.appendChild(card);
  });
}

render();
</script>
</body>
</html>
